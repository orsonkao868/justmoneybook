<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="就是記帳">
<meta name="theme-color" content="#FF6B9D">
<title>就是記帳 💰</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="就是記帳">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Microsoft JhengHei',sans-serif}
:root{
  --pink:#FF6B9D;--pink-light:#FFB3CC;--pink-dark:#E8457A;
  --purple:#C084FC;--purple-light:#E9D5FF;
  --yellow:#FCD34D;--yellow-light:#FEF9C3;
  --green:#34D399;--green-light:#D1FAE5;
  --blue:#60A5FA;--blue-light:#DBEAFE;
  --orange:#FB923C;--orange-light:#FFEDD5;
  --red:#F87171;--red-light:#FEE2E2;
  --bg:#FFF5F8;--card:#FFFFFF;--text:#2D1B35;--text-sub:#9B7FA6;
  --border:#F0D6E8;--shadow:0 4px 20px rgba(255,107,157,0.15)
}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;overflow-x:hidden}

/* 底部導航 */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;cursor:pointer;transition:all 0.2s;color:var(--text-sub);font-size:11px;gap:3px}
.nav-item.active{color:var(--pink)}
.nav-item:active{transform:scale(0.9)}
.nav-icon{font-size:22px;line-height:1}

/* 頁面 */
.screen{display:none;padding:0 0 20px}
.screen.active{display:block}

/* 頂部標題 */
.page-header{background:linear-gradient(135deg,var(--pink),var(--purple));padding:20px 16px 24px;position:relative;overflow:hidden}
.page-header::before{content:'🌸';position:absolute;top:-10px;right:-10px;font-size:80px;opacity:0.15}
.page-header::after{content:'✨';position:absolute;bottom:-5px;left:20px;font-size:40px;opacity:0.2}
.page-title{font-size:22px;font-weight:bold;color:white;margin-bottom:4px}
.page-sub{font-size:13px;color:rgba(255,255,255,0.8)}

/* 卡片 */
.card{background:var(--card);border-radius:20px;padding:16px;margin:12px 16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:bold;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* 按鈕 */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:50px;border:none;cursor:pointer;font-weight:bold;font-size:14px;transition:all 0.2s;gap:6px}
.btn:active{transform:scale(0.95)}
.btn-pink{background:var(--pink);color:white;box-shadow:0 4px 12px rgba(255,107,157,0.4)}
.btn-outline{background:white;color:var(--pink);border:2px solid var(--pink)}
.btn-gray{background:#F3F4F6;color:#6B7280}
.btn-full{width:100%}
.btn-sm{padding:6px 14px;font-size:12px}

/* 記帳輸入 */
.add-btn-float{position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,157,0.5);z-index:99;transition:all 0.2s;border:none}
.add-btn-float:active{transform:scale(0.9)}

/* 底部彈出框 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:28px 28px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:bold;color:var(--text);margin-bottom:16px;text-align:center}

/* 金額輸入 */
.amount-display{background:var(--bg);border-radius:16px;padding:16px;margin-bottom:16px;text-align:center}
.currency-switch{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.currency-btn{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:bold;cursor:pointer;border:2px solid var(--border);background:white;color:var(--text-sub);transition:all 0.2s}
.currency-btn.active{background:var(--pink);color:white;border-color:var(--pink)}
.amount-number{font-size:42px;font-weight:bold;color:var(--text);min-height:52px;display:flex;align-items:center;justify-content:center;gap:4px}
.amount-currency{font-size:20px;color:var(--text-sub);font-weight:normal}

/* 數字鍵盤 */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.numpad-key{background:var(--bg);border:none;border-radius:14px;padding:16px;font-size:20px;font-weight:bold;color:var(--text);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.numpad-key:active{transform:scale(0.92);background:var(--pink-light)}
.numpad-key.del{background:#FEE2E2;color:var(--red)}
.numpad-key.ok{background:var(--pink);color:white;font-size:16px}

/* 類別選擇 */
.type-switch{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin-bottom:12px}
.type-btn{flex:1;padding:8px;border-radius:10px;border:none;font-size:13px;font-weight:bold;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text-sub)}
.type-btn.active{background:white;color:var(--pink);box-shadow:0 2px 8px rgba(0,0,0,0.1)}

.category-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{white-space:nowrap;padding:6px 14px;border-radius:50px;font-size:12px;font-weight:bold;cursor:pointer;border:2px solid var(--border);background:white;color:var(--text-sub);transition:all 0.2s;flex-shrink:0}
.cat-tab.active{color:white;border-color:transparent}

.subcategory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.subcat-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:14px;cursor:pointer;border:2px solid var(--border);background:white;transition:all 0.2s}
.subcat-item:active{transform:scale(0.94)}
.subcat-item.selected{border-color:var(--pink);background:var(--pink-light)}
.subcat-icon{font-size:22px}
.subcat-name{font-size:10px;color:var(--text-sub);text-align:center;line-height:1.2}
.subcat-item.selected .subcat-name{color:var(--pink-dark);font-weight:bold}
.subcat-item.add-new{border-style:dashed;color:var(--text-sub)}

/* 備註輸入 */
.note-input{width:100%;border:2px solid var(--border);border-radius:14px;padding:12px;font-size:14px;color:var(--text);outline:none;background:var(--bg);resize:none;font-family:inherit}
.note-input:focus{border-color:var(--pink)}

/* 首頁統計 */
.summary-card{background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:24px;padding:20px;margin:12px 16px;color:white;position:relative;overflow:hidden}
.summary-card::before{content:'💰';position:absolute;right:-10px;top:-10px;font-size:80px;opacity:0.15}
.summary-date{font-size:13px;opacity:0.85;margin-bottom:4px}
.summary-balance{font-size:36px;font-weight:bold;margin-bottom:12px}
.summary-row{display:flex;gap:12px}
.summary-item{flex:1;background:rgba(255,255,255,0.2);border-radius:14px;padding:10px;text-align:center}
.summary-item-label{font-size:11px;opacity:0.85;margin-bottom:2px}
.summary-item-val{font-size:18px;font-weight:bold}

/* 記錄列表 */
.record-group{margin:0 16px 8px}
.record-group-title{font-size:12px;color:var(--text-sub);font-weight:bold;margin-bottom:8px;padding:0 4px}
.record-item{background:white;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid var(--border)}
.record-icon-wrap{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-cat{font-size:13px;font-weight:bold;color:var(--text)}
.record-note{font-size:11px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-right{text-align:right;flex-shrink:0}
.record-amount{font-size:16px;font-weight:bold}
.record-time{font-size:10px;color:var(--text-sub);margin-top:2px}
.amount-expense{color:var(--red)}
.amount-income{color:var(--green)}

/* 統計頁 */
.period-selector{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin:12px 16px}
.period-btn{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;font-weight:bold;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text-sub)}
.period-btn.active{background:white;color:var(--pink);box-shadow:0 2px 8px rgba(0,0,0,0.1)}

.chart-wrap{display:flex;justify-content:center;margin:8px 0}
.pie-canvas{max-width:200px;max-height:200px}

.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg);border-radius:10px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-info{flex:1;min-width:0}
.legend-name{font-size:11px;color:var(--text-sub)}
.legend-val{font-size:13px;font-weight:bold;color:var(--text)}

.stat-list-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-list-item:last-child{border-bottom:none}
.stat-bar-bg{flex:1;background:var(--bg);border-radius:50px;height:8px;overflow:hidden}
.stat-bar-fill{height:8px;border-radius:50px;transition:width 0.5s}

/* 設定頁 */
.setting-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.setting-item:last-child{border-bottom:none}
.setting-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.setting-info{flex:1;padding:0 10px}
.setting-name{font-size:14px;font-weight:bold;color:var(--text)}
.setting-desc{font-size:11px;color:var(--text-sub);margin-top:1px}
.setting-arrow{color:var(--text-sub);font-size:16px}

/* 空狀態 */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-sub)}
.empty-icon{font-size:60px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:bold;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:13px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#2D1B35;color:white;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:bold;z-index:999;transition:transform 0.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.hidden{display:none}
</style>
</head>
<body>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<!-- 底部導航 -->
<nav class="nav-bar">
  <div class="nav-item active" onclick="switchTab('home')" id="nav-home">
    <div class="nav-icon">🏠</div>
    <div>首頁</div>
  </div>
  <div class="nav-item" onclick="switchTab('records')" id="nav-records">
    <div class="nav-icon">📋</div>
    <div>記錄</div>
  </div>
  <div class="nav-item" onclick="switchTab('stats')" id="nav-stats">
    <div class="nav-icon">📊</div>
    <div>統計</div>
  </div>
  <div class="nav-item" onclick="switchTab('settings')" id="nav-settings">
    <div class="nav-icon">⚙️</div>
    <div>設定</div>
  </div>
</nav>

<!-- 新增按鈕 -->
<button class="add-btn-float" onclick="openAddModal()">＋</button>

<!-- ========== 首頁 ========== -->
<div id="screen-home" class="screen active">
  <div class="page-header">
    <div class="page-title">就是記帳 💰</div>
    <div class="page-sub" id="home-date"></div>
  </div>
  <div class="summary-card">
    <div class="summary-date" id="summary-date"></div>
    <div class="summary-balance" id="summary-balance">NT$ 0</div>
    <div class="summary-row">
      <div class="summary-item">
        <div class="summary-item-label">💸 支出</div>
        <div class="summary-item-val" id="summary-expense">0</div>
      </div>
      <div class="summary-item">
        <div class="summary-item-label">💵 收入</div>
        <div class="summary-item-val" id="summary-income">0</div>
      </div>
    </div>
  </div>
  <div style="padding:0 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:14px;font-weight:bold;color:var(--text)">今日記錄</div>
    <div style="font-size:12px;color:var(--pink);cursor:pointer" onclick="switchTab('records')">查看全部 →</div>
  </div>
  <div id="home-records"></div>
</div>

<!-- ========== 記錄頁 ========== -->
<div id="screen-records" class="screen">
  <div class="page-header">
    <div class="page-title">所有記錄 📋</div>
    <div class="page-sub">點擊記錄可以刪除</div>
  </div>
  <div style="padding:12px 16px;display:flex;gap:8px">
    <button class="btn btn-sm" id="filter-all" onclick="filterRecords('all')" style="background:var(--pink);color:white;border:none">全部</button>
    <button class="btn btn-sm btn-outline" id="filter-expense" onclick="filterRecords('expense')">支出</button>
    <button class="btn btn-sm btn-outline" id="filter-income" onclick="filterRecords('income')">收入</button>
  </div>
  <div id="records-list"></div>
</div>

<!-- ========== 統計頁 ========== -->
<div id="screen-stats" class="screen">
  <div class="page-header">
    <div class="page-title">消費統計 📊</div>
    <div class="page-sub">看看錢都花到哪裡去了</div>
  </div>
  <div class="period-selector">
    <button class="period-btn active" onclick="setPeriod('day')" id="period-day">今日</button>
    <button class="period-btn" onclick="setPeriod('week')" id="period-week">本週</button>
    <button class="period-btn" onclick="setPeriod('month')" id="period-month">本月</button>
    <button class="period-btn" onclick="setPeriod('custom')" id="period-custom">自訂</button>
  </div>
  <div id="custom-date-range" class="hidden" style="padding:0 16px;margin-bottom:8px;display:flex;gap:8px;align-items:center">
    <input type="date" id="date-from" style="flex:1;padding:8px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none">
    <span style="color:var(--text-sub)">～</span>
    <input type="date" id="date-to" style="flex:1;padding:8px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none">
    <button class="btn btn-sm btn-pink" onclick="applyCustomRange()">確認</button>
  </div>
  <div class="card">
    <div class="card-title">💸 支出分布</div>
    <div class="chart-wrap">
      <canvas id="pie-chart" class="pie-canvas" width="200" height="200"></canvas>
    </div>
    <div class="legend-grid" id="chart-legend"></div>
  </div>
  <div class="card">
    <div class="card-title">📈 各類別明細</div>
    <div id="stat-detail-list"></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <div>
        <div style="font-size:12px;color:var(--text-sub)">總支出</div>
        <div style="font-size:20px;font-weight:bold;color:var(--red)" id="stat-total-expense">NT$ 0</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text-sub)">總收入</div>
        <div style="font-size:20px;font-weight:bold;color:var(--green)" id="stat-total-income">NT$ 0</div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;color:var(--text-sub)">結餘</div>
      <div style="font-size:22px;font-weight:bold" id="stat-balance">NT$ 0</div>
    </div>
  </div>
</div>

<!-- ========== 設定頁 ========== -->
<div id="screen-settings" class="screen">
  <div class="page-header">
    <div class="page-title">設定 ⚙️</div>
    <div class="page-sub">個人化你的記帳體驗</div>
  </div>
  <div class="card">
    <div class="card-title">💱 貨幣設定</div>
    <div class="type-switch" style="margin-bottom:0">
      <button class="type-btn active" id="currency-ntd-btn" onclick="setCurrency('NTD')">🇹🇼 台幣 NT$</button>
      <button class="type-btn" id="currency-jpy-btn" onclick="setCurrency('JPY')">🇯🇵 日幣 ¥</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🗂️ 自訂類別</div>
    <div id="custom-cats-list"></div>
    <button class="btn btn-outline btn-full" style="margin-top:8px" onclick="openAddCatModal()">＋ 新增類別</button>
  </div>
  <div class="card">
    <div class="card-title">🗑️ 資料管理</div>
    <div class="setting-item" onclick="exportData()">
      <div class="setting-icon">📤</div>
      <div class="setting-info">
        <div class="setting-name">匯出資料</div>
        <div class="setting-desc">下載所有記帳記錄</div>
      </div>
      <div class="setting-arrow">›</div>
    </div>
    <div class="setting-item" onclick="clearAllData()">
      <div class="setting-icon">🗑️</div>
      <div class="setting-info">
        <div class="setting-name">清除所有資料</div>
        <div class="setting-desc">刪除全部記錄（無法復原）</div>
      </div>
      <div class="setting-arrow">›</div>
    </div>
  </div>
  <div style="text-align:center;padding:20px;color:var(--text-sub);font-size:12px">
    就是記帳 v1.0 💕<br>資料儲存在您的裝置上
  </div>
</div>

<!-- ========== 新增記帳 Modal ========== -->
<div class="modal-overlay" id="add-modal" onclick="handleModalClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">新增記錄 ✨</div>
    <div class="type-switch">
      <button class="type-btn active" id="add-type-expense" onclick="setAddType('expense')">💸 支出</button>
      <button class="type-btn" id="add-type-income" onclick="setAddType('income')">💵 收入</button>
    </div>
    <div class="amount-display">
      <div class="currency-switch">
        <button class="currency-btn active" id="add-curr-ntd" onclick="setAddCurrency('NTD')">NT$</button>
        <button class="currency-btn" id="add-curr-jpy" onclick="setAddCurrency('JPY')">¥</button>
      </div>
      <div class="amount-number">
        <span class="amount-currency" id="add-curr-symbol">NT$</span>
        <span id="add-amount-display">0</span>
      </div>
    </div>
    <div class="numpad">
      <button class="numpad-key" onclick="numpadPress('7')">7</button>
      <button class="numpad-key" onclick="numpadPress('8')">8</button>
      <button class="numpad-key" onclick="numpadPress('9')">9</button>
      <button class="numpad-key" onclick="numpadPress('4')">4</button>
      <button class="numpad-key" onclick="numpadPress('5')">5</button>
      <button class="numpad-key" onclick="numpadPress('6')">6</button>
      <button class="numpad-key" onclick="numpadPress('1')">1</button>
      <button class="numpad-key" onclick="numpadPress('2')">2</button>
      <button class="numpad-key" onclick="numpadPress('3')">3</button>
      <button class="numpad-key" onclick="numpadPress('.')">.</button>
      <button class="numpad-key" onclick="numpadPress('0')">0</button>
      <button class="numpad-key del" onclick="numpadPress('del')">⌫</button>
    </div>
    <div class="category-tabs" id="add-cat-tabs"></div>
    <div class="subcategory-grid" id="add-subcat-grid"></div>
    <textarea class="note-input" id="add-note" placeholder="備註（選填）✏️" rows="2"></textarea>
    <button class="btn btn-pink btn-full" style="margin-top:12px" onclick="saveRecord()">記錄完成 ✓</button>
  </div>
</div>

<!-- ========== 新增自訂類別 Modal ========== -->
<div class="modal-overlay" id="add-cat-modal" onclick="handleCatModalClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-height:60vh">
    <div class="modal-handle"></div>

  filterType:'all'

/* ==========================================
   存讀檔
   ========================================== */
function saveData(){
  try{
    localStorage.setItem('moneybook_v1',JSON.stringify({
      records:appState.records,
      currency:appState.currency,
      customSubs:appState.customSubs
    }));
  }catch(e){console.log('存檔失敗',e);}
}

function loadData(){
  try{
    const raw=localStorage.getItem('moneybook_v1');
    if(!raw) return;
    const d=JSON.parse(raw);
    appState.records=d.records||[];
    appState.currency=d.currency||'NTD';
    appState.customSubs=d.customSubs||{};
  }catch(e){console.log('讀檔失敗',e);}
}

/* ==========================================
   工具函式
   ========================================== */
function formatAmount(amount,currency){
  const cur=currency||appState.currency;
  if(cur==='JPY') return `¥${Math.round(amount).toLocaleString()}`;
  return `NT$${parseFloat(amount).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
}

function formatDate(dateStr){
  const d=new Date(dateStr);
  const now=new Date();
  const today=now.toDateString();
  const yesterday=new Date(now-86400000).toDateString();
  if(d.toDateString()===today) return '今天';
  if(d.toDateString()===yesterday) return '昨天';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function formatTime(dateStr){
  const d=new Date(dateStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getDateStr(date){
  return date.toISOString().split('T')[0];
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function getCatInfo(type,catId,subcatId){
  const cats=type==='expense'?CATEGORIES.expense:CATEGORIES.income;
  const cat=cats.find(c=>c.id===catId);
  if(!cat) return{name:'其他',icon:'💰',color:'#9B7FA6'};
  if(!subcatId) return{name:cat.name,icon:cat.icon,color:cat.color};
  let sub=cat.subs.find(s=>s.id===subcatId);
  if(!sub){
    const customs=appState.customSubs[catId]||[];
    sub=customs.find(s=>s.id===subcatId);
  }
  return sub?{name:sub.name,icon:sub.icon,color:cat.color}:{name:cat.name,icon:cat.icon,color:cat.color};
}

/* ==========================================
   導航
   ========================================== */
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('active');
  appState.currentTab=tab;
  if(tab==='home') renderHome();
  if(tab==='records') renderRecords();
  if(tab==='stats') renderStats();
  if(tab==='settings') renderSettings();
}

/* ==========================================
   首頁
   ========================================== */
function renderHome(){
  const now=new Date();
  document.getElementById('home-date').textContent=
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('summary-date').textContent='本月收支總覽';
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthRecords=appState.records.filter(r=>{
    const d=new Date(r.date);
    return d>=monthStart&&d<=now;
  });
  const expense=monthRecords.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const income=monthRecords.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const balance=income-expense;
  document.getElementById('summary-balance').textContent=
    (balance>=0?'+':'')+formatAmount(balance);
  document.getElementById('summary-expense').textContent=formatAmount(expense);
  document.getElementById('summary-income').textContent=formatAmount(income);
  const todayStr=getDateStr(now);
  const todayRecords=appState.records.filter(r=>r.date.startsWith(todayStr))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const container=document.getElementById('home-records');
  if(todayRecords.length===0){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">🌸</div><div class="empty-text">今天還沒有記錄</div><div class="empty-sub">點右下角 ＋ 開始記帳吧！</div></div>`;
    return;
  }
  container.innerHTML=todayRecords.slice(0,5).map(r=>recordItemHTML(r)).join('');
}

/* ==========================================
   記錄列表
   ========================================== */
function renderRecords(){
  const filtered=appState.filterType==='all'?appState.records:
    appState.records.filter(r=>r.type===appState.filterType);
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const groups={};
  sorted.forEach(r=>{
    const dateKey=r.date.split('T')[0];
    if(!groups[dateKey]) groups[dateKey]=[];
    groups[dateKey].push(r);
  });
  const container=document.getElementById('records-list');
  if(sorted.length===0){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">沒有記錄</div><div class="empty-sub">開始記錄你的收支吧！</div></div>`;
    return;
  }
  container.innerHTML=Object.entries(groups).map(([date,records])=>{
    const dayExp=records.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const dayInc=records.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const d=new Date(date);
    const dateLabel=formatDate(date+'T00:00:00');
    const fullDate=`${d.getMonth()+1}月${d.getDate()}日`;
    return`<div class="record-group">
      <div class="record-group-title" style="display:flex;justify-content:space-between">
        <span>${dateLabel} ${fullDate}</span>
        <span style="color:var(--red)">-${formatAmount(dayExp)}</span>
      </div>
      ${records.map(r=>recordItemHTML(r,true)).join('')}
    </div>`;
  }).join('');
}

function recordItemHTML(r,showDelete=false){
  const info=getCatInfo(r.type,r.cat,r.subcat);
  const isExpense=r.type==='expense';
  return`<div class="record-item" onclick="${showDelete?`confirmDelete('${r.id}')`:''}" style="${showDelete?'cursor:pointer':''}">
    <div class="record-icon-wrap" style="background:${info.color}22">
      <span>${info.icon}</span>
    </div>
    <div class="record-info">
      <div class="record-cat">${info.name}</div>
      <div class="record-note">${r.note||formatTime(r.date)}</div>
    </div>
    <div class="record-right">
      <div class="record-amount ${isExpense?'amount-expense':'amount-income'}">
        ${isExpense?'-':'+'}${formatAmount(r.amount,r.currency)}
      </div>
      <div class="record-time">${formatTime(r.date)}</div>
    </div>
  </div>`;
}

function filterRecords(type){
  appState.filterType=type;
  ['all','expense','income'].forEach(t=>{
    const btn=document.getElementById(`filter-${t}`);
    if(t===type){btn.style.background='var(--pink)';btn.style.color='white';btn.style.border='none';}
    else{btn.style.background='white';btn.style.color='var(--pink)';btn.style.border='2px solid var(--pink)';}
  });
  renderRecords();
}

function confirmDelete(id){
  if(confirm('確定要刪除這筆記錄嗎？')){
    appState.records=appState.records.filter(r=>r.id!==id);
    saveData();
    renderRecords();
    showToast('已刪除 🗑️');
  }
}

/* ==========================================
   新增記帳
   ========================================== */
function openAddModal(){
  appState.addAmount='';
  appState.addCategory='';
  appState.addSubcat='';
  document.getElementById('add-amount-display').textContent='0';
  document.getElementById('add-note').value='';
  setAddType('expense');
  document.getElementById('add-modal').classList.add('show');
}

function handleModalClick(e){
  if(e.target===document.getElementById('add-modal')){
    document.getElementById('add-modal').classList.remove('show');
  }
}

function setAddType(type){
  appState.addType=type;
  appState.addCategory='';
  appState.addSubcat='';
  ['expense','income'].forEach(t=>{
    const btn=document.getElementById(`add-type-${t}`);
    btn.classList.toggle('active',t===type);
  });
  buildCatTabs();
}

function setAddCurrency(cur){
  appState.addCurrency=cur;
  ['NTD','JPY'].forEach(c=>{
    document.getElementById(`add-curr-${c.toLowerCase()}`).classList.toggle('active',c===cur);
  });
  document.getElementById('add-curr-symbol').textContent=cur==='JPY'?'¥':'NT$';
}

function numpadPress(key){
  let amt=appState.addAmount;
  if(key==='del'){
    amt=amt.slice(0,-1);
  }else if(key==='.'){
    if(!amt.includes('.')) amt+='.';
  }else{
    if(amt==='0') amt=key;
    else if(amt.includes('.')&&amt.split('.')[1].length>=2) return;
    else amt+=key;
  }
  appState.addAmount=amt;
  document.getElementById('add-amount-display').textContent=amt||'0';
}

function buildCatTabs(){
  const cats=appState.addType==='expense'?CATEGORIES.expense:CATEGORIES.income;
  const tabsEl=document.getElementById('add-cat-tabs');
  tabsEl.innerHTML=cats.map(c=>`
    <div class="cat-tab ${appState.addCategory===c.id?'active':''}"
      style="${appState.addCategory===c.id?`background:${c.color}`:''}"
      onclick="selectCat('${c.id}')">${c.icon} ${c.name}</div>`).join('');
  if(appState.addCategory) buildSubcatGrid();
  else document.getElementById('add-subcat-grid').innerHTML='';
}

function selectCat(catId){
  appState.addCategory=catId;
  appState.addSubcat='';
  buildCatTabs();
  buildSubcatGrid();
}

function buildSubcatGrid(){
  const cats=appState.addType==='expense'?CATEGORIES.expense:CATEGORIES.income;
  const cat=cats.find(c=>c.id===appState.addCategory);
  if(!cat) return;
  const customs=appState.customSubs[appState.addCategory]||[];
  const allSubs=[...cat.subs,...customs];
  const grid=document.getElementById('add-subcat-grid');
  grid.innerHTML=allSubs.map(s=>`
    <div class="subcat-item ${appState.addSubcat===s.id?'selected':''}"
      onclick="selectSubcat('${s.id}')">
      <div class="subcat-icon">${s.icon}</div>
      <div class="subcat-name">${s.name}</div>
    </div>`).join('')+`
    <div class="subcat-item add-new" onclick="openAddSubcatModal('${appState.addCategory}')">
      <div class="subcat-icon">＋</div>
      <div class="subcat-name">自訂</div>
    </div>`;
}

function selectSubcat(subcatId){
  appState.addSubcat=subcatId;
  buildSubcatGrid();
}

function openAddSubcatModal(catId){
  document.getElementById('add-cat-modal').classList.add('show');
  buildNewCatTabs(catId);
  buildEmojiPicker();
}

function handleCatModalClick(e){
  if(e.target===document.getElementById('add-cat-modal')){
    document.getElementById('add-cat-modal').classList.remove('show');
  }
}

function saveRecord(){
  const amount=parseFloat(appState.addAmount);
  if(!amount||amount<=0){showToast('請輸入金額 💰');return;}
  if(!appState.addCategory){showToast('請選擇類別 📂');return;}
  const record={
    id:Date.now().toString(),
    date:new Date().toISOString(),
    type:appState.addType,
    currency:appState.addCurrency,
    amount:amount,
    cat:appState.addCategory,
    subcat:appState.addSubcat,
    note:document.getElementById('add-note').value.trim()
  };
  appState.records.push(record);
  saveData();
  document.getElementById('add-modal').classList.remove('show');
  showToast('記錄完成 ✨');
  if(appState.currentTab==='home') renderHome();
  if(appState.currentTab==='records') renderRecords();
}

/* ==========================================
   統計
   ========================================== */
function setPeriod(period){
  appState.statPeriod=period;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`period-${period}`).classList.add('active');
  const customRange=document.getElementById('custom-date-range');
  customRange.classList.toggle('hidden',period!=='custom');
  if(period!=='custom') renderStats();
}

function applyCustomRange(){
  appState.statFrom=document.getElementById('date-from').value;
  appState.statTo=document.getElementById('date-to').value;
  if(!appState.statFrom||!appState.statTo){showToast('請選擇日期範圍');return;}
  renderStats();
}

function getStatRecords(){
  const now=new Date();
  let from,to=now;
  if(appState.statPeriod==='day'){
    from=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  }else if(appState.statPeriod==='week'){
    const day=now.getDay();
    from=new Date(now);from.setDate(now.getDate()-day);
    from.setHours(0,0,0,0);
  }else if(appState.statPeriod==='month'){
    from=new Date(now.getFullYear(),now.getMonth(),1);
  }else if(appState.statPeriod==='custom'&&appState.statFrom&&appState.statTo){
    from=new Date(appState.statFrom);
    to=new Date(appState.statTo);to.setHours(23,59,59,999);
  }else{
    from=new Date(now.getFullYear(),now.getMonth(),1);
  }
  return appState.records.filter(r=>{const d=new Date(r.date);return d>=from&&d<=to;});
}

function renderStats(){
  const records=getStatRecords();
  const expenses=records.filter(r=>r.type==='expense');
  const incomes=records.filter(r=>r.type==='income');
  const totalExp=expenses.reduce((s,r)=>s+r.amount,0);
  const totalInc=incomes.reduce((s,r)=>s+r.amount,0);
  document.getElementById('stat-total-expense').textContent=formatAmount(totalExp);
  document.getElementById('stat-total-income').textContent=formatAmount(totalInc);
  const balance=totalInc-totalExp;
  const balEl=document.getElementById('stat-balance');
  balEl.textContent=(balance>=0?'+':'')+formatAmount(balance);
  balEl.style.color=balance>=0?'var(--green)':'var(--red)';
  const catGroups={};
  expenses.forEach(r=>{
    const key=r.cat;
    if(!catGroups[key]) catGroups[key]=0;
    catGroups[key]+=r.amount;
  });
  const sortedCats=Object.entries(catGroups).sort((a,b)=>b[1]-a[1]);
  drawPieChart(sortedCats,totalExp);
  renderStatDetail(sortedCats,totalExp);
}

function drawPieChart(data,total){
  const canvas=document.getElementById('pie-chart');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);
  if(total===0||data.length===0){
    ctx.beginPath();ctx.arc(100,100,80,0,Math.PI*2);
    ctx.fillStyle='#F3F4F6';ctx.fill();
    ctx.fillStyle='#9B7FA6';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText('暫無資料',100,105);
    document.getElementById('chart-legend').innerHTML='';
    return;
  }
  let startAngle=-Math.PI/2;
  const legend=[];
  data.forEach(([catId,amount],i)=>{
    const cats=CATEGORIES.expense;
    const cat=cats.find(c=>c.id===catId);
    const color=CHART_COLORS[i%CHART_COLORS.length];
    const slice=(amount/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.arc(100,100,85,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
    startAngle+=slice;
    legend.push({name:cat?cat.name:catId,color,amount,pct:Math.round(amount/total*100)});
  });
  ctx.beginPath();ctx.arc(100,100,45,0,Math.PI*2);
  ctx.fillStyle='white';ctx.fill();
  ctx.fillStyle='var(--text)';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  ctx.fillText('支出',100,97);
  ctx.fillStyle='var(--pink)';ctx.font='bold 11px sans-serif';
  ctx.fillText(formatAmount(total),100,113);
  document.getElementById('chart-legend').innerHTML=legend.map(l=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${l.color}"></div>
      <div class="legend-info">
        <div class="legend-name">${l.name}</div>
        <div class="legend-val">${formatAmount(l.amount)}</div>
      </div>
      <div style="font-size:12px;color:var(--text-sub)">${l.pct}%</div>
    </div>`).join('');
}

function renderStatDetail(data,total){
  const container=document.getElementById('stat-detail-list');
  if(data.length===0){container.innerHTML='<div style="text-align:center;color:var(--text-sub);padding:20px;font-size:13px">這段期間沒有支出記錄</div>';return;}
  container.innerHTML=data.map(([catId,amount],i)=>{
    const cat=CATEGORIES.expense.find(c=>c.id===catId);
    const pct=total>0?Math.round(amount/total*100):0;
    const color=CHART_COLORS[i%CHART_COLORS.length];
    return`<div class="stat-list-item">
      <div style="font-size:20px;width:28px;text-align:center">${cat?cat.icon:'💰'}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px;font-weight:bold">${cat?cat.name:catId}</span>
          <span style="font-size:13px;color:var(--red)">${formatAmount(amount)}</span>
        </div>
        <div class="stat-bar-bg">
          <div class="stat-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-sub);width:32px;text-align:right">${pct}%</div>
    </div>`;
  }).join('');
}

/* ==========================================
   設定頁
   ========================================== */
function renderSettings(){
  const ntdBtn=document.getElementById('currency-ntd-btn');
  const jpyBtn=document.getElementById('currency-jpy-btn');
  ntdBtn.classList.toggle('active',appState.currency==='NTD');
  jpyBtn.classList.toggle('active',appState.currency==='JPY');
  renderCustomCats();
}

function setCurrency(cur){
  appState.currency=cur;
  saveData();
  renderSettings();
  showToast(`已切換為${cur==='NTD'?'台幣 NT$':'日幣 ¥'} 💱`);
}

function renderCustomCats(){
  const container=document.getElementById('custom-cats-list');
  const allCustoms=Object.entries(appState.customSubs);
  if(allCustoms.length===0){
    container.innerHTML='<div style="font-size:13px;color:var(--text-sub);text-align:center;padding:12px">還沒有自訂細項</div>';
    return;
  }
  container.innerHTML=allCustoms.map(([catId,subs])=>{
    const allCats=[...CATEGORIES.expense,...CATEGORIES.income];
    const cat=allCats.find(c=>c.id===catId);
    return subs.map(s=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:20px">${s.icon}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:bold">${s.name}</div>
          <div style="font-size:11px;color:var(--text-sub)">${cat?cat.name:catId}</div>
        </div>
        <button onclick="deleteCustomSub('${catId}','${s.id}')" style="background:var(--red-light);color:var(--red);border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">刪除</button>
      </div>`).join('');
  }).join('');
}

function deleteCustomSub(catId,subId){
  if(!appState.customSubs[catId]) return;
  appState.customSubs[catId]=appState.customSubs[catId].filter(s=>s.id!==subId);
  saveData();
  renderSettings();
  showToast('已刪除 🗑️');
}

function openAddCatModal(){
  document.getElementById('add-cat-modal').classList.add('show');
  buildNewCatTabs('');
  buildEmojiPicker();
}

function buildNewCatTabs(selectedId){
  const allCats=[...CATEGORIES.expense,...CATEGORIES.income];
  const tabs=document.getElementById('new-cat-tabs');
  tabs.innerHTML=allCats.map(c=>`
    <div class="cat-tab ${selectedId===c.id?'active':''}"
      style="${selectedId===c.id?`background:${c.color}`:''}"
      onclick="selectNewCatTab('${c.id}')">${c.icon} ${c.name}</div>`).join('');
  tabs.dataset.selected=selectedId;
}

function selectNewCatTab(catId){
  buildNewCatTabs(catId);
}

const EMOJI_OPTIONS=['🍕','🍔','🍣','🧁','🥗','🍺','🎸','🎯','🎪','🏆','💎','🌺','🦋','🐶','🐱','🚀','⚡','🔥','💫','🌈','🎀','🛍️','💊','🧩','🎭','🏄','🤸','🎻','🎹','🎺','🌙','☀️','🍀','🌻','🦄','🐉','🦊','🐼','🍦','🧃'];

function buildEmojiPicker(){
  const picker=document.getElementById('emoji-picker');
  picker.innerHTML=EMOJI_OPTIONS.map(e=>`
    <div onclick="selectEmoji('${e}')" style="font-size:22px;text-align:center;padding:6px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s" id="emoji-${e.codePointAt(0)}">${e}</div>`).join('');
}

let selectedEmoji='🏷️';
function selectEmoji(emoji){
  selectedEmoji=emoji;
  document.querySelectorAll('#emoji-picker div').forEach(d=>d.style.borderColor='transparent');
  const key=emoji.codePointAt(0);
  const el=document.getElementById(`emoji-${key}`);
  if(el) el.style.borderColor='var(--pink)';
}

function saveCustomSubcat(){
  const tabs=document.getElementById('new-cat-tabs');
  const catId=tabs.dataset.selected;
  const name=document.getElementById('new-subcat-name').value.trim();
  if(!catId){showToast('請選擇類別');return;}
  if(!name){showToast('請輸入名稱');return;}
  if(!appState.customSubs[catId]) appState.customSubs[catId]=[];
  const newSub={id:`custom_${Date.now()}`,name,icon:selectedEmoji};
  appState.customSubs[catId].push(newSub);
  saveData();
  document.getElementById('add-cat-modal').classList.remove('show');
  document.getElementById('new-subcat-name').value='';
  showToast(`已新增「${name}」✨`);
  renderSettings();
  if(appState.addCategory===catId) buildSubcatGrid();
}

function openAddSubcatModal(catId){
  document.getElementById('add-cat-modal').classList.add('show');
  buildNewCatTabs(catId);
  buildEmojiPicker();
}

/* ==========================================
   資料管理
   ========================================== */
function exportData(){
  const data=JSON.stringify(appState.records,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`就是記帳_${getDateStr(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('匯出成功 📤');
}

function clearAllData(){
  if(confirm('確定要清除所有資料嗎？此操作無法復原！')){
    appState.records=[];
    appState.customSubs={};
    saveData();
    renderHome();
    showToast('已清除所有資料 🗑️');
  }
}

/* ==========================================
   初始化
   ========================================== */
function init(){
  loadData();
  setAddCurrency(appState.currency);
  renderHome();
}

document.addEventListener('DOMContentLoaded',()=>init());
</script>
</body>
</html>
